name: release

on:
  push:
    branches:
      - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Créer la release GitHub ─────────────────────────────────
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: get-version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.get-version.outputs.version }}" \
            --title "RCAM Décomptes v${{ steps.get-version.outputs.version }}" \
            --notes "" --draft=false 2>/dev/null || true

  # ── 2. Windows — installeur NSIS + portable .exe ───────────────
  windows:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri (installer + exe)
        run: npx tauri build

      - name: Upload artifacts to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ needs.create-release.outputs.version }}"
          # Portable
          Copy-Item "src-tauri/target/release/rcam.exe" "src-tauri/target/release/RCAM-Decomptees-portable.exe"
          gh release upload $tag "src-tauri/target/release/RCAM-Decomptees-portable.exe" --clobber
          # Installeur NSIS
          Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }
          # MSI
          Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }

  # ── 3. macOS ARM (M1/M2/M3/M4) ────────────────────────────────
  macos:
    needs: create-release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri
        run: npx tauri build --target aarch64-apple-darwin

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.create-release.outputs.version }}" \
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg --clobber

  # ── 4. Linux AppImage ──────────────────────────────────────────
  linux:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libglib2.0-dev

      - run: npm ci

      - name: Build Tauri
        run: npx tauri build

      - name: Upload AppImage to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.create-release.outputs.version }}" \
            src-tauri/target/release/bundle/appimage/*.AppImage --clobber
